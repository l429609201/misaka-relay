services:
  misaka-relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: l429609201/misaka-relay:latest
    container_name: misaka-relay
    restart: unless-stopped
    ports:
      - "52000:80"
    environment:
      # 必填：与弹幕库「系统设置 → API → Webhook API Key」保持一致
      - WEBHOOK_KEY=your_webhook_api_key_here
      - TZ=Asia/Shanghai

